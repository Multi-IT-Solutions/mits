<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Brochure</title>
    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* BROCHURE CARD CONTAINER */
        .brochure-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* HEADER IMAGE / GRAPHIC AREA */
        .brochure-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .brochure-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brochure-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* MAIN CONTENT AREA */
        .brochure-body {
            padding: 30px 20px;
        }

        .services-list {
            margin-bottom: 25px;
        }

        .service-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
            color: #333;
        }

        .service-item::before {
            content: "✓";
            color: #2a5298;
            font-weight: bold;
            margin-right: 10px;
        }

        /* FOOTER / CONTACT SECTION */
        .brochure-footer {
            background: #222;
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        .brochure-footer p {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 15px;
        }

        /* CRITICAL: CLICKABLE LINKS STYLING */
        .contact-info-block {
            margin: 10px 0;
        }

        .contact-info-block a {
            color: #00bcd4; /* Bright color taake links wazeh nazar aayin */
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            padding: 8px 15px;
            margin: 5px 0;
            border: 1px solid #00bcd4;
            border-radius: 5px;
            transition: all 0.3s ease;
            
            /* Yeh lines link ko click block hone se bachati hain */
            position: relative;
            z-index: 9999;
            cursor: pointer;
            pointer-events: auto;
        }

        .contact-info-block a:hover {
            background: #00bcd4;
            color: #222;
        }
    </style>
</head>
<body>

    <div class="brochure-card">
        <div class="brochure-header">
            <h1>Our Business Brochure</h1>
            <p>Professional Services & Solutions</p>
        </div>

        <div class="brochure-body">
            <div class="services-list">
                <div class="service-item">High Quality Premium Designs</div>
                <div class="service-item">Fast and Reliable Delivery</div>
                <div class="service-item">24/7 Customer Support</div>
                <div class="service-item">Affordable Pricing Plans</div>
            </div>
        </div>

        <div class="brochure-footer">
            <p>For more details or queries, contact us directly:</p>
            
            <div class="contact-info-block">
                <a href="tel:+923001234567">📞 Call Us: +92 300 1234567</a>
            </div>

            <div class="contact-info-block">
                <a href="mailto:info@example.com">✉️ Email: info@example.com</a>
            </div>
        </div>
    </div>

</body>
</html>
